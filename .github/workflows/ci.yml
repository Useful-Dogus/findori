name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # 빌드 시점 환경변수 검증 통과용 더미값 (실제 API 호출 없음 — 모든 라우트 SSR dynamic)
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key-for-ci-build-only-placeholder
          SUPABASE_SERVICE_ROLE_KEY: dummy-service-role-key-for-ci-build-placeholder
          ADMIN_PASSWORD: ci-dummy-password-16chars
          ADMIN_SESSION_SECRET: ci-dummy-session-secret-for-build-only-32chars!!
          ANTHROPIC_API_KEY: sk-ant-dummy-key-for-ci-build-only-placeholder
          CRON_SECRET: ci-dummy-cron-secret

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test
