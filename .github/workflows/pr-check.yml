name: PR Check

on:
  pull_request:
  workflow_dispatch:

jobs:
  pr-check:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: "https://example.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "anon-key-placeholder-12345"
      SUPABASE_SERVICE_ROLE_KEY: "service-role-placeholder-12345"
      ADMIN_PASSWORD: "admin-password-placeholder"
      ADMIN_SESSION_SECRET: "ci-admin-session-secret-placeholder-1234567890"
      ANTHROPIC_API_KEY: "sk-ant-placeholder-for-ci"
      CRON_SECRET: "cron-secret-placeholder"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run PR gate
        run: npm run pr:check
